<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Join GlamGo | Digital Atelier</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed": "#d8e2ff",
                        "background": "#131318",
                        "surface-container-high": "#2a292f",
                        "surface-container-lowest": "#0e0e13",
                        "on-background": "#e4e1e9",
                        "on-secondary-fixed-variant": "#70343e",
                        "on-error-container": "#ffdad6",
                        "tertiary-container": "#9dadd5",
                        "secondary": "#ffb2bc",
                        "inverse-on-surface": "#303036",
                        "primary-fixed": "#ffdea4",
                        "on-primary-container": "#543d0c",
                        "on-secondary-container": "#f4a2ad",
                        "outline-variant": "#4d463a",
                        "on-primary": "#412d00",
                        "on-tertiary": "#203051",
                        "error-container": "#93000a",
                        "surface-container": "#1f1f25",
                        "on-error": "#690005",
                        "on-tertiary-container": "#314163",
                        "on-surface-variant": "#d0c5b5",
                        "surface-container-low": "#1b1b20",
                        "primary-fixed-dim": "#e4c285",
                        "surface-container-highest": "#35343a",
                        "surface": "#131318",
                        "on-secondary": "#551e29",
                        "on-primary-fixed-variant": "#5a4312",
                        "inverse-primary": "#745a27",
                        "surface-dim": "#131318",
                        "surface-variant": "#35343a",
                        "secondary-container": "#733641",
                        "primary": "#e6c487",
                        "tertiary-fixed-dim": "#b6c6ef",
                        "secondary-fixed-dim": "#ffb2bc",
                        "on-secondary-fixed": "#3a0915",
                        "surface-tint": "#e4c285",
                        "on-tertiary-fixed": "#081b3b",
                        "primary-container": "#c9a96e",
                        "on-tertiary-fixed-variant": "#374669",
                        "on-primary-fixed": "#261900",
                        "on-surface": "#e4e1e9",
                        "inverse-surface": "#e4e1e9",
                        "surface-bright": "#39383e",
                        "tertiary": "#b8c8f2",
                        "error": "#ffb4ab",
                        "outline": "#998f81",
                        "secondary-fixed": "#ffd9dd"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0A0A0F;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,10%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,15%,1) 0, transparent 50%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(31, 31, 37, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(230, 196, 135, 0.08);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="font-body text-on-surface flex items-center justify-center p-6 selection:bg-primary/30">
<!-- Top AppBar Navigation Shell (Filtered for Transactional Page but Brand Identity remains) -->
<header class="fixed top-0 w-full z-50 flex justify-center items-center py-8 bg-transparent">
<div class="text-2xl font-serif italic text-[#e6c487] tracking-tighter">GlamGo</div>
</header>
<main class="w-full max-w-xl mt-12 mb-12">
<div class="glass-panel p-8 md:p-12 rounded-xl shadow-2xl flex flex-col gap-10">
<!-- Hero Heading -->
<div class="text-center space-y-2">
<h1 class="font-headline text-4xl md:text-5xl tracking-tight text-on-surface">Join GlamGo</h1>
<p class="font-label text-xs tracking-[0.3em] uppercase text-on-surface-variant opacity-70">Begin your aesthetic journey</p>
</div>
<!-- Role Selector -->
<div class="grid grid-cols-2 gap-4">
<button class="group relative flex flex-col items-center gap-4 p-6 rounded-lg bg-surface-container border border-outline-variant/10 hover:border-primary/40 transition-all duration-500">
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="person_search">person_search</span>
</div>
<span class="font-label text-[10px] uppercase tracking-widest text-center">I'm looking for a stylist</span>
<div class="absolute inset-x-0 bottom-0 h-0.5 bg-primary scale-x-0 group-focus:scale-x-100 transition-transform"></div>
</button>
<button class="group relative flex flex-col items-center gap-4 p-6 rounded-lg bg-surface-container border border-outline-variant/10 hover:border-primary/40 transition-all duration-500">
<div class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="content_cut">content_cut</span>
</div>
<span class="font-label text-[10px] uppercase tracking-widest text-center">I'm a stylist</span>
<div class="absolute inset-x-0 bottom-0 h-0.5 bg-primary scale-x-0 group-focus:scale-x-100 transition-transform"></div>
</button>
</div>
<!-- Form -->
<form class="space-y-6">
<div class="space-y-6">
<!-- Full Name -->
<div class="relative group">
<label class="block font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Full Name</label>
<input class="w-full bg-surface-container-low border-0 border-b border-outline-variant/30 py-4 px-4 text-on-surface focus:ring-0 focus:border-primary placeholder:text-on-surface-variant/20 transition-all outline-none rounded-t-lg" placeholder="ALEXANDRA VOGUE" type="text"/>
</div>
<!-- Email -->
<div class="relative group">
<label class="block font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Email Address</label>
<input class="w-full bg-surface-container-low border-0 border-b border-outline-variant/30 py-4 px-4 text-on-surface focus:ring-0 focus:border-primary placeholder:text-on-surface-variant/20 transition-all outline-none rounded-t-lg" placeholder="ALEXANDRA@GLAMGO.COM" type="email"/>
</div>
<!-- Phone -->
<div class="relative group">
<label class="block font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Phone Number</label>
<input class="w-full bg-surface-container-low border-0 border-b border-outline-variant/30 py-4 px-4 text-on-surface focus:ring-0 focus:border-primary placeholder:text-on-surface-variant/20 transition-all outline-none rounded-t-lg" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<!-- Password -->
<div class="relative group">
<label class="block font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Password</label>
<input class="w-full bg-surface-container-low border-0 border-b border-outline-variant/30 py-4 px-4 text-on-surface focus:ring-0 focus:border-primary placeholder:text-on-surface-variant/20 transition-all outline-none rounded-t-lg" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Terms -->
<div class="flex items-center gap-3 pt-4">
<input class="w-4 h-4 rounded border-outline-variant/40 bg-transparent text-primary focus:ring-offset-background focus:ring-primary" type="checkbox"/>
<span class="text-[11px] text-on-surface-variant/60 font-label tracking-wide">I AGREE TO THE TERMS OF SERVICE AND PRIVACY POLICY</span>
</div>
<!-- CTA -->
<div class="pt-6">
<button class="w-full py-5 rounded-md bg-gradient-to-br from-primary to-primary-container text-on-primary font-label font-bold tracking-[0.2em] uppercase shadow-lg shadow-primary/10 hover:shadow-primary/20 hover:scale-[1.01] active:scale-95 transition-all duration-300" type="submit">
                        Create Account
                    </button>
</div>
</form>
<!-- Footer Login Link -->
<div class="text-center pt-2">
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/50">
                    Already a member? 
                    <a class="text-primary hover:text-primary-fixed-dim transition-colors ml-2 font-bold underline underline-offset-4 decoration-primary/20" href="#">Sign In</a>
</p>
</div>
</div>
</main>
<!-- Footer Shell -->
<footer class="fixed bottom-0 left-0 w-full z-40 flex flex-col items-center pb-8 gap-4">
<div class="flex gap-8">
<a class="font-sans text-[10px] uppercase tracking-[0.2em] text-[#e4e1e9]/40 hover:text-[#e6c487] transition-opacity" href="#">Privacy Policy</a>
<a class="font-sans text-[10px] uppercase tracking-[0.2em] text-[#e4e1e9]/40 hover:text-[#e6c487] transition-opacity" href="#">Terms of Service</a>
<a class="font-sans text-[10px] uppercase tracking-[0.2em] text-[#e4e1e9]/40 hover:text-[#e6c487] transition-opacity" href="#">Contact Support</a>
</div>
<p class="font-sans text-[10px] uppercase tracking-[0.2em] text-[#e4e1e9]/40">© 2024 GlamGo Digital Atelier. All Rights Reserved.</p>
</footer>
</body></html>
